# =============================================
# Backend Deployment
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-scanner-backend
  labels:
    app: terraform-scanner-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraform-scanner-backend
  template:
    metadata:
      labels:
        app: terraform-scanner-backend
    spec:
      containers:
        - name: backend
          image: eyen/terraform-scanner-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# =============================================
# Backend Service (ClusterIP - 내부 통신용)
# =============================================
apiVersion: v1
kind: Service
metadata:
  name: terraform-scanner-backend-service
spec:
  selector:
    app: terraform-scanner-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# =============================================
# Frontend Deployment
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-scanner-frontend
  labels:
    app: terraform-scanner-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraform-scanner-frontend
  template:
    metadata:
      labels:
        app: terraform-scanner-frontend
    spec:
      containers:
        - name: frontend
          image: eyen/terraform-scanner-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# =============================================
# Frontend Service (포트포워딩 접속)
# =============================================
apiVersion: v1
kind: Service
metadata:
  name: terraform-scanner-frontend-service
spec:
  selector:
    app: terraform-scanner-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
  
  
  
