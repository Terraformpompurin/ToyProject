# =====================================================
# 백엔드 Deployment
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraform-backend
  template:
    metadata:
      labels:
        app: terraform-backend
    spec:
      containers:
        - name: terraform-backend
          image: nafa21/terraform-scanner-backend:latest
          ports:
            - containerPort: 8000

---
# =====================================================
# 백엔드 ClusterIP Service (프론트엔드가 내부에서 접근)
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: terraform-backend-service
spec:
  type: ClusterIP
  selector:
    app: terraform-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
# =====================================================
# 프론트엔드 Deployment
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: terraform-frontend
  template:
    metadata:
      labels:
        app: terraform-frontend
    spec:
      containers:
        - name: terraform-frontend
          image: nafa21/terraform-scanner-frontend:latest
          ports:
            - containerPort: 80

---
# =====================================================
# 프론트엔드 NodePort Service (외부에서 접근)
# http://10.0.0.10:30080 으로 접속
# =====================================================
apiVersion: v1
kind: Service
metadata:
  name: terraform-frontend-service
spec:
  type: NodePort
  selector:
    app: terraform-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080