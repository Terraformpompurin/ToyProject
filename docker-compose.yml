version: '3.8'

services:
  backend:
    build: ./backend
    container_name: terraform-scanner-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: terraform-scanner-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      
      